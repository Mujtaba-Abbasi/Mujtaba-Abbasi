<svg width="850" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#252262"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="850" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g fill="#A78BFA" opacity="0.07">
    <circle cx="520" cy="20" r="1.5"/><circle cx="560" cy="20" r="1.5"/><circle cx="600" cy="20" r="1.5"/><circle cx="640" cy="20" r="1.5"/><circle cx="680" cy="20" r="1.5"/><circle cx="720" cy="20" r="1.5"/><circle cx="760" cy="20" r="1.5"/><circle cx="800" cy="20" r="1.5"/>
    <circle cx="520" cy="50" r="1.5"/><circle cx="560" cy="50" r="1.5"/><circle cx="600" cy="50" r="1.5"/><circle cx="640" cy="50" r="1.5"/><circle cx="680" cy="50" r="1.5"/><circle cx="720" cy="50" r="1.5"/><circle cx="760" cy="50" r="1.5"/><circle cx="800" cy="50" r="1.5"/>
    <circle cx="520" cy="80" r="1.5"/><circle cx="560" cy="80" r="1.5"/><circle cx="600" cy="80" r="1.5"/><circle cx="640" cy="80" r="1.5"/><circle cx="680" cy="80" r="1.5"/><circle cx="720" cy="80" r="1.5"/><circle cx="760" cy="80" r="1.5"/><circle cx="800" cy="80" r="1.5"/>
    <circle cx="520" cy="110" r="1.5"/><circle cx="560" cy="110" r="1.5"/><circle cx="600" cy="110" r="1.5"/><circle cx="640" cy="110" r="1.5"/><circle cx="680" cy="110" r="1.5"/><circle cx="720" cy="110" r="1.5"/><circle cx="760" cy="110" r="1.5"/><circle cx="800" cy="110" r="1.5"/>
    <circle cx="520" cy="140" r="1.5"/><circle cx="560" cy="140" r="1.5"/><circle cx="600" cy="140" r="1.5"/><circle cx="640" cy="140" r="1.5"/><circle cx="680" cy="140" r="1.5"/><circle cx="720" cy="140" r="1.5"/><circle cx="760" cy="140" r="1.5"/><circle cx="800" cy="140" r="1.5"/>
    <circle cx="520" cy="170" r="1.5"/><circle cx="560" cy="170" r="1.5"/><circle cx="600" cy="170" r="1.5"/><circle cx="640" cy="170" r="1.5"/><circle cx="680" cy="170" r="1.5"/><circle cx="720" cy="170" r="1.5"/><circle cx="760" cy="170" r="1.5"/><circle cx="800" cy="170" r="1.5"/>
  </g>

  <!-- Network constellation — connection lines -->
  <g stroke="#A78BFA" stroke-width="1" opacity="0.25">
    <line x1="550" y1="35" x2="610" y2="65"/>
    <line x1="610" y1="65" x2="580" y2="115"/>
    <line x1="610" y1="65" x2="690" y2="45"/>
    <line x1="690" y1="45" x2="755" y2="85"/>
    <line x1="755" y1="85" x2="710" y2="135"/>
    <line x1="710" y1="135" x2="580" y2="115"/>
    <line x1="755" y1="85" x2="815" y2="60"/>
    <line x1="815" y1="60" x2="810" y2="125"/>
    <line x1="810" y1="125" x2="710" y2="135"/>
    <line x1="690" y1="45" x2="670" y2="18"/>
    <line x1="580" y1="115" x2="630" y2="165"/>
    <line x1="710" y1="135" x2="770" y2="168"/>
    <line x1="815" y1="60" x2="835" y2="30"/>
    <line x1="810" y1="125" x2="835" y2="160"/>
    <line x1="550" y1="35" x2="530" y2="15"/>
    <line x1="630" y1="165" x2="710" y2="135"/>
  </g>

  <!-- Network constellation — secondary lines -->
  <g stroke="#A78BFA" stroke-width="0.5" opacity="0.12">
    <line x1="610" y1="65" x2="755" y2="85"/>
    <line x1="580" y1="115" x2="810" y2="125"/>
    <line x1="690" y1="45" x2="710" y2="135"/>
    <line x1="550" y1="35" x2="580" y2="115"/>
  </g>

  <!-- Network constellation — nodes -->
  <g fill="#A78BFA">
    <circle cx="530" cy="15" r="1.5" opacity="0.3"/>
    <circle cx="550" cy="35" r="2.5" opacity="0.45"/>
    <circle cx="610" cy="65" r="4" opacity="0.65"/>
    <circle cx="580" cy="115" r="3" opacity="0.5"/>
    <circle cx="690" cy="45" r="3.5" opacity="0.6"/>
    <circle cx="670" cy="18" r="2" opacity="0.35"/>
    <circle cx="755" cy="85" r="4.5" opacity="0.7"/>
    <circle cx="710" cy="135" r="3" opacity="0.5"/>
    <circle cx="815" cy="60" r="3" opacity="0.45"/>
    <circle cx="810" cy="125" r="2.5" opacity="0.4"/>
    <circle cx="835" cy="30" r="1.5" opacity="0.3"/>
    <circle cx="835" cy="160" r="1.5" opacity="0.3"/>
    <circle cx="630" cy="165" r="2" opacity="0.35"/>
    <circle cx="770" cy="168" r="2" opacity="0.35"/>
  </g>

  <!-- Node glows on key nodes -->
  <circle cx="610" cy="65" r="14" fill="url(#node-glow)" opacity="0.35"/>
  <circle cx="755" cy="85" r="16" fill="url(#node-glow)" opacity="0.3"/>
  <circle cx="690" cy="45" r="12" fill="url(#node-glow)" opacity="0.25"/>

  <!-- Accent bar -->
  <rect x="48" y="118" width="80" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Name -->
  <text x="48" y="106" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="42" fill="#FFFFFF" font-weight="700" letter-spacing="-1">Ghulam Mujtaba</text>

  <!-- Role -->
  <text x="48" y="152" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#C4B5FD" font-weight="400">
    <tspan>Founding Engineer @ Dextego</tspan>
    <tspan fill="#A78BFA" dx="6">·</tspan>
    <tspan dx="6">Full Stack Engineer</tspan>
    <tspan fill="#A78BFA" dx="6">·</tspan>
    <tspan dx="6">AI Builder</tspan>
  </text>

  <!-- Location -->
  <text x="48" y="180" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#A78BFA" font-weight="500">Islamabad, Pakistan</text>

  <!-- Border -->
  <rect width="850" height="200" rx="12" fill="none" stroke="#6C63FF" stroke-width="1" opacity="0.2"/>
</svg>
